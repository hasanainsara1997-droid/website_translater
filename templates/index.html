<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Translator Pro MAX</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
}

/* العنوان */
.header {
    padding: 15px;
    text-align: center;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0, 255, 204, 0.2);
    color: #00ffcc;
    text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
}

.header h1 {
    font-size: 24px;
    margin-bottom: 5px;
}

/* ✅ الأزرار العلوية مع القائمة المنسدلة */
.buttons {
    padding: 10px;
    text-align: center;
    background: rgba(0, 0, 0, 0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

/* ✅ قائمة اختيار اللغة */
.lang-selector {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 15px;
    border-radius: 25px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.lang-selector label {
    color: #aaa;
    font-size: 13px;
    font-weight: bold;
}

.lang-selector select {
    background: rgba(0, 0, 0, 0.5);
    color: #00ffcc;
    border: 1px solid rgba(0, 255, 204, 0.3);
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    transition: all 0.3s;
    min-width: 120px;
}

.lang-selector select:hover {
    border-color: #00ffcc;
    box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
}

.lang-arrow {
    color: #00ffcc;
    font-size: 20px;
    font-weight: bold;
}

/* أزرار رئيسية */
button {
    padding: 12px 24px;
    margin: 5px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}

.translate { 
    background: linear-gradient(135deg, #00c853, #00e676); 
    color: white; 
    box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
}

.toggle { 
    background: linear-gradient(135deg, #aa00ff, #e040fb); 
    color: white; 
    box-shadow: 0 4px 15px rgba(170, 0, 255, 0.4);
}

.lang-switch {
    background: linear-gradient(135deg, #ff9100, #ffc400);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 145, 0, 0.4);
}

.swap-btn {
    background: rgba(0, 255, 204, 0.2);
    color: #00ffcc;
    border: 1px solid rgba(0, 255, 204, 0.5);
    padding: 10px 15px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
}

.swap-btn:hover {
    background: rgba(0, 255, 204, 0.4);
    transform: rotate(180deg);
}

/* تقسيم الشاشة */
.container {
    flex: 1;
    display: flex;
    overflow: hidden;
}

/* يمين ويسار */
.left, .right {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 2px solid rgba(51, 51, 51, 0.5);
    position: relative;
    background: rgba(30, 30, 30, 0.5);
}

.right {
    border-right: none;
}

/* toolbar */
.toolbar {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: rgba(0, 0, 0, 0.4);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    flex-wrap: wrap;
}

.tool-btn {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 12px;
    font-weight: 500;
}

.tool-btn:hover {
    background: rgba(0, 150, 255, 0.3);
    border-color: rgba(0, 150, 255, 0.5);
    transform: scale(1.05);
}

/* عداد الكلمات */
.word-counter {
    background: rgba(0, 0, 0, 0.4);
    color: #00ffcc;
    padding: 8px 15px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Cairo', Tahoma, Arial, sans-serif;
    gap: 20px;
}

.counter-number {
    background: rgba(0, 255, 204, 0.2);
    color: #00ffcc;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: bold;
    min-width: 40px;
    text-align: center;
    border: 1px solid rgba(0, 255, 204, 0.3);
}

/* مؤشر التحديد */
.selection-info {
    background: rgba(0, 176, 255, 0.2);
    color: #00b0ff;
    padding: 5px 15px;
    font-size: 12px;
    text-align: center;
    border-bottom: 1px solid rgba(0, 176, 255, 0.3);
    display: none;
}

.selection-info.active {
    display: block;
}

/* input */
#input {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    padding: 20px;
    background: rgba(30, 30, 30, 0.8);
    color: white;
    font-size: 16px;
    line-height: 2;
    font-family: 'Segoe UI', 'Cairo', 'Tahoma', Arial, sans-serif;
    direction: auto;
    unicode-bidi: plaintext;
    resize: none;
    overflow-y: auto;
}

#input::placeholder {
    color: #666;
    font-style: italic;
}

/* صندوق الإخراج */
.box {
    flex: 1;
    padding: 20px;
    font-size: 16px;
    line-height: 2;
    background: rgba(26, 26, 26, 0.8);
    color: white;
    overflow-y: auto;
    font-family: 'Segoe UI', 'Cairo', 'Tahoma', Arial, sans-serif;
    direction: auto;
    unicode-bidi: plaintext;
    white-space: pre-wrap;
    word-wrap: break-word;
    position: relative;
}

/* التظليل للنص المحدد */
.highlight-text {
    background: linear-gradient(135deg, rgba(255, 145, 0, 0.6), rgba(255, 196, 0, 0.6));
    color: #000;
    padding: 2px 4px;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(255, 145, 0, 0.8);
    animation: highlight-pulse 1s ease-in-out infinite alternate;
    font-weight: bold;
}

@keyframes highlight-pulse {
    from { box-shadow: 0 0 5px rgba(255, 145, 0, 0.5); }
    to { box-shadow: 0 0 15px rgba(255, 145, 0, 1); }
}

/* status */
#status {
    color: #aaa;
    font-size: 13px;
    padding: 8px 15px;
    background: rgba(0, 0, 0, 0.3);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 8px;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00ffcc;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* تأثيرات */
.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: #00ffcc;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
}

::-webkit-scrollbar-thumb {
    background: rgba(0, 255, 204, 0.3);
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 255, 204, 0.5);

/* ✅ تنسيقات حقوق البرمجة */

.dev-details {

    gap: 2px;
}

.dev-label {
    font-size: 11px;
    color: #888;

.dev-name {

    letter-spacing: 0.5px;
}

.copyright-divider {
    width: 1px;
    height: 30px;
    background: linear-gradient(180deg, transparent, rgba(0, 255, 204, 0.5), transparent);
}

.copyright-year {
    font-size: 14px;
    color: #666;
    font-weight: 500;
    letter-spacing: 1px;
}

/* Responsive */
@media (max-width: 768px) {
    .buttons {
        flex-direction: column;
    }
    
    .lang-selector {
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .container {
        flex-direction: column;
    }
    .left, .right {
        width: 100%;
        height: 50%;
        border-right: none;
        border-bottom: 2px solid rgba(51, 51, 51, 0.5);
    }
    .right {
        border-bottom: none;
    }
    
    .copyright-content {
        flex-direction: column;
        gap: 10px;
    }
    
    .copyright-divider {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.5), transparent);
    }
    
    .developer-info {
        padding: 6px 15px;
    }
    
    .dev-name {
        font-size: 14px;
    }
}
</style>
</head>

        <button class="swap-btn" onclick="swapLanguages()" title="Swap languages">⇄</button>

            <option value="en">🇺🇸 English</option>
            <option value="fa">🇮🇷 Persian (Farsi)</option>
            <option value="fr">🇫🇷 French</option>
            <option value="de">🇩🇪 German</option>
            <option value="es">🇪🇸 Spanish</option>
            <option value="tr">🇹🇷 Turkish</option>
            <option value="ru">🇷🇺 Russian</option>

<div class="copyright-section">

            <div class="dev-details">

                <span class="dev-name">Hasanain Jawad</span>
            </div>

</div>

<script>

// ✅ قاموس الترجمة (فقط إنجليزي/عربي)
const translations = {
    en: {
        appTitle: "🌐 Translator Pro MAX",
        translateBtn: "🔍 Translate",
        fromLang: "From:",
        toLang: "To:",
        uiLangBtn: "🌐 عربي",
        copyBtn: "📄 Copy",
        pasteBtn: "📋 Paste",
        clearBtn: "🗑️ Clear",
        selectAllBtn: "☑️ Select All",
        selectionInfo: "✏️ Select text to highlight in translation",
        inputPlaceholder: "Enter text here...\nYou can write text in any language",
        copyResultBtn: "📄 Copy Result",
        clearResultBtn: "🗑️ Clear",
        selectResultBtn: "☑️ Select All",
        saveBtn: "💾 Save",
        statusReady: "Ready - Enter text and click Translate",
        statusTranslating: "Translating...",
        statusEnterText: "⚠️ Please enter text first",
        statusSuccess: "✅ Translation completed successfully",
        statusError: "❌ Error: ",
        toastInputCopied: "Input copied!",
        toastPasted: "Pasted!",
        toastResultCopied: "Result copied!",
        toastNoContent: "No content to save!",
        toastSaved: "Saved to file!",
        toastAllCopied: "All content copied!",
        toastWelcome: "Welcome! Press Ctrl+Enter to translate",
        toastCannotAccess: "Cannot access clipboard",
        wordsLabel: "Words:"
    },
    ar: {
        appTitle: "🌐 المترجم الاحترافي",
        translateBtn: "🔍 ترجمة",
        fromLang: "من:",
        toLang: "إلى:",
        uiLangBtn: "🌐 English",
        copyBtn: "📄 نسخ",
        pasteBtn: "📋 لصق",
        clearBtn: "🗑️ مسح",
        selectAllBtn: "☑️ تحديد الكل",
        selectionInfo: "✏️ حدد نصاً لتظليله في الترجمة",
        inputPlaceholder: "أدخل النص هنا...\nيمكنك كتابة نص بأي لغة",
        copyResultBtn: "📄 نسخ النتيجة",
        clearResultBtn: "🗑️ مسح",
        selectResultBtn: "☑️ تحديد الكل",
        saveBtn: "💾 حفظ",
        statusReady: "جاهز - أدخل النص واضغط ترجمة",
        statusTranslating: "جاري الترجمة...",
        statusEnterText: "⚠️ الرجاء إدخال النص أولاً",
        statusSuccess: "✅ تمت الترجمة بنجاح",
        statusError: "❌ خطأ: ",
        toastInputCopied: "تم نسخ المدخل!",
        toastPasted: "تم اللصق!",
        toastResultCopied: "تم نسخ النتيجة!",
        toastNoContent: "لا يوجد محتوى للحفظ!",
        toastSaved: "تم الحفظ في ملف!",
        toastAllCopied: "تم نسخ كل المحتوى!",
        toastWelcome: "أهلاً! اضغط Ctrl+Enter للترجمة",
        toastCannotAccess: "لا يمكن الوصول للحافظة",
        wordsLabel: "الكلمات:"
    }
};

let uiLanguage = 'en';

// ✅ أسماء اللغات للعرض
const langNames = {
    'en': 'English', 'ar': 'Arabic', 'fa': 'Persian', 'fr': 'French',
    'de': 'German', 'es': 'Spanish', 'tr': 'Turkish', 'ru': 'Russian',
    'zh': 'Chinese', 'ja': 'Japanese', 'ko': 'Korean', 'hi': 'Hindi', 'ur': 'Urdu'
};

// ✅ تبديل اللغات
function swapLanguages() {
    const source = document.getElementById('sourceLang');
    const target = document.getElementById('targetLang');
    
    const temp = source.value;
    source.value = target.value;
    target.value = temp;
    
    updateLangDisplay();
}

// ✅ تحديث عرض اللغات
function updateLangDisplay() {
    const source = document.getElementById('sourceLang').value;
    const target = document.getElementById('targetLang').value;
    
    // منع اختيار نفس اللغة
    if (source === target) {
        // تغيير الهدف إلى لغة أخرى
        const options = document.getElementById('targetLang').options;
        for (let opt of options) {
            if (opt.value !== source) {
                document.getElementById('targetLang').value = opt.value;
                break;
            }
        }
    }
}

// ✅ حساب الكلمات
function countWords(text) {
    if (!text || !text.trim()) return 0;
    text = text.replace(/[\s\n\r\t]+/g, ' ').trim();
    let words = text.split(' ');
    words = words.filter(word => /[a-zA-Z\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF]/.test(word));
    return words.length;
}

function updateWordCounters() {
    const inputText = document.getElementById("input").value;
    const inputWords = countWords(inputText);
    document.getElementById("inputWordCount").innerText = inputWords;
    
    const outputText = document.getElementById("output").innerText;
    const outputWords = countWords(outputText);
    document.getElementById("outputWordCount").innerText = outputWords;
    
    updateCounterStyle("inputWordCount", inputWords);
    updateCounterStyle("outputWordCount", outputWords);
}

function updateCounterStyle(elementId, count) {
    const element = document.getElementById(elementId);
    if (count > 0) {
        element.style.background = "rgba(0, 255, 204, 0.3)";
        element.style.color = "#00ffcc";
        element.style.borderColor = "rgba(0, 255, 204, 0.5)";
    } else {
        element.style.background = "rgba(0, 255, 204, 0.1)";
        element.style.color = "#00ffcc";
        element.style.borderColor = "rgba(0, 255, 204, 0.3)";
    }
}

// ✅ مراقبة التحديد
function setupSelectionTracking() {
    const input = document.getElementById('input');
    
    input.addEventListener('mouseup', handleSelection);
    input.addEventListener('keyup', handleSelection);
    input.addEventListener('select', handleSelection);
    
    input.addEventListener('focus', () => {
        document.getElementById('selectionInfoInput').classList.add('active');
    });
    
    input.addEventListener('blur', () => {
        setTimeout(() => {
            document.getElementById('selectionInfoInput').classList.remove('active');
        }, 200);
    });
}

function handleSelection() {
    const input = document.getElementById('input');
    const start = input.selectionStart;
    const end = input.selectionEnd;
    
    if (start === end) {
        removeHighlightFromOutput();
        return;
    }
    
    const selectedText = input.value.substring(start, end).trim();
    if (selectedText.length < 2) return;
    
    highlightInOutput(selectedText);
}

function highlightInOutput(selectedText) {
    const outputBox = document.getElementById('output');
    const outputText = outputBox.innerText;
    
    if (!outputText) return;
    
    const inputText = document.getElementById('input').value;
    const selectionStart = document.getElementById('input').selectionStart;
    const selectionEnd = document.getElementById('input').selectionEnd;
    
    const ratio = selectionStart / inputText.length;
    const selectionLength = selectionEnd - selectionStart;
    const outputSelectionLength = Math.floor(selectionLength * (outputText.length / inputText.length));
    
    const outputStart = Math.floor(ratio * outputText.length);
    const outputEnd = Math.min(outputStart + outputSelectionLength, outputText.length);
    
    const before = escapeHtml(outputText.substring(0, outputStart));
    const highlighted = escapeHtml(outputText.substring(outputStart, outputEnd));
    const after = escapeHtml(outputText.substring(outputEnd));
    
    outputBox.innerHTML = before + 
        '<span class="highlight-text">' + highlighted + '</span>' + 
        after;
    
    const highlightElement = outputBox.querySelector('.highlight-text');
    if (highlightElement) {
        highlightElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    document.getElementById('selectionInfoOutput').classList.add('active');
    setTimeout(() => {
        document.getElementById('selectionInfoOutput').classList.remove('active');
    }, 2000);
}

function removeHighlightFromOutput() {
    const outputBox = document.getElementById('output');
    const text = outputBox.innerText;
    if (text) {
        outputBox.innerText = text;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.innerText = text;
    return div.innerHTML;
}

// ✅ الترجمة مع إرسال اللغات المختارة
async function translateText() {
    let rawText = document.getElementById("input").value;
    
    if (rawText.trim() === "") {
        document.getElementById("statusText").innerText = getText('statusEnterText');
        document.getElementById("statusText").style.color = "#ff5252";
        return;
    }

    const sourceLang = document.getElementById('sourceLang').value;
    const targetLang = document.getElementById('targetLang').value;

    document.getElementById("statusText").innerHTML = '<span class="loading"></span> ' + getText('statusTranslating');
    document.getElementById("statusText").style.color = "#ffb74d";

    try {
        let response = await fetch("/translate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                text: rawText,
                source: sourceLang,
                target: targetLang
            })
        });
        
        let data = await response.json();
        
        const outputBox = document.getElementById("output");
        outputBox.innerText = data.result || "No translation received";
        
        updateWordCounters();

        document.getElementById("statusText").innerText = getText('statusSuccess');
        document.getElementById("statusText").style.color = "#69f0ae";
        
    } catch (error) {
        document.getElementById("statusText").innerText = getText('statusError') + error.message;
        document.getElementById("statusText").style.color = "#ff5252";
    }
}

// ✅ تبديل لغة الواجهة (إنجليزي/عربي فقط)
function toggleUILanguage() {
    uiLanguage = uiLanguage === 'en' ? 'ar' : 'en';
    updateUILanguage();
    showToast(uiLanguage === 'ar' ? "تم تغيير اللغة للعربية" : "Language changed to English");
}

function updateUILanguage() {
    const t = translations[uiLanguage];
    document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (t[key]) el.innerText = t[key];
    });
    document.querySelectorAll('[data-key-placeholder]').forEach(el => {
        const key = el.getAttribute('data-key-placeholder');
        if (t[key]) el.placeholder = t[key];
    });
    document.body.style.direction = uiLanguage === 'ar' ? 'rtl' : 'ltr';
    document.title = t.appTitle;
    updateWordCounters();
}

function getText(key) {
    return translations[uiLanguage][key] || key;
}

// ✅ الأدوات
function copyInput(){
    let text = document.getElementById("input").value;
    navigator.clipboard.writeText(text).then(() => showToast(getText('toastInputCopied')));
}

async function pasteInput(){
    try {
        let text = await navigator.clipboard.readText();
        let inputBox = document.getElementById("input");
        let start = inputBox.selectionStart;
        let end = inputBox.selectionEnd;
        let currentValue = inputBox.value;
        
        inputBox.value = currentValue.substring(0, start) + text + currentValue.substring(end);
        inputBox.selectionStart = inputBox.selectionEnd = start + text.length;
        
        updateWordCounters();
        showToast(getText('toastPasted'));
    } catch (err) {
        showToast(getText('toastCannotAccess'));
    }
}

function clearInput(){
    document.getElementById("input").value = "";
    document.getElementById("input").focus();
    updateWordCounters();
    removeHighlightFromOutput();
}

function selectAllInput(){
    let inputBox = document.getElementById("input");
    inputBox.select();
    inputBox.focus();
}

function copyOutput(){
    let text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text).then(() => showToast(getText('toastResultCopied')));
}

function clearOutput(){
    document.getElementById("output").innerText = "";
    updateWordCounters();
}

function selectAllOutput(){
    let range = document.createRange();
    let outputBox = document.getElementById("output");
    range.selectNodeContents(outputBox);
    let selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
}

function downloadResult(){
    let text = document.getElementById("output").innerText;
    if (!text) {
        showToast(getText('toastNoContent'));
        return;
    }
    
    let blob = new Blob([text], {type: "text/plain;charset=utf-8"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "translation_" + new Date().getTime() + ".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast(getText('toastSaved'));
}

function copyAll(){
    let inputText = document.getElementById("input").value;
    let outputText = document.getElementById("output").innerText;
    
    let originalLabel = uiLanguage === 'ar' ? "النص الأصلي" : "Original";
    let translationLabel = uiLanguage === 'ar' ? "الترجمة" : "Translation";
    
    let combined = originalLabel + ":\n" + inputText + "\n\n---\n\n" + translationLabel + ":\n" + outputText;
    
    navigator.clipboard.writeText(combined).then(() => showToast(getText('toastAllCopied')));
}

function showToast(message){
    let toast = document.createElement("div");
    toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        ${uiLanguage === 'ar' ? 'left: 20px;' : 'right: 20px;'}
        background: rgba(0, 255, 204, 0.9);
        color: #000;
        padding: 12px 24px;
        border-radius: 25px;
        font-weight: bold;
        z-index: 1000;
        animation: slideIn 0.3s ease;
        font-family: 'Segoe UI', 'Cairo', Tahoma, Arial, sans-serif;
    `;
    toast.innerText = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = "slideOut 0.3s ease";
        setTimeout(() => toast.remove(), 300);
    }, 2000);
}

// ✅ CSS animations
let style = document.createElement("style");
style.innerHTML = `
    @keyframes slideIn {
        from { transform: translateX(100px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100px); opacity: 0; }
    }
`;
document.head.appendChild(style);

// ✅ Event listeners
document.addEventListener("keydown", function(e) {
    if (e.ctrlKey && e.key === "Enter") translateText();
});

document.getElementById("input").addEventListener("input", function () {
    document.getElementById("statusText").innerText = getText('statusReady');
    document.getElementById("statusText").style.color = "#aaa";
    updateWordCounters();
    removeHighlightFromOutput();
});

// ✅ التحميل
window.onload = function() {
    document.getElementById("input").focus();
    setupSelectionTracking();
    updateWordCounters();
    showToast(getText('toastWelcome'));
};

</script>
